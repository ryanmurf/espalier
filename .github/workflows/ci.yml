name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nesify
          POSTGRES_PASSWORD: nesify
          POSTGRES_DB: espalier_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
        env:
          PG_HOST: localhost
          PG_PORT: 55432
          PG_USER: nesify
          PG_PASSWORD: nesify
          PG_DATABASE: espalier_test

  test-bun:
    name: Bun
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nesify
          POSTGRES_PASSWORD: nesify
          POSTGRES_DB: espalier_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Bun can run pnpm workspaces; use Node for pnpm install
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: bun run vitest
        env:
          PG_HOST: localhost
          PG_PORT: 55432
          PG_USER: nesify
          PG_PASSWORD: nesify
          PG_DATABASE: espalier_test

  test-deno:
    name: Deno
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nesify
          POSTGRES_PASSWORD: nesify
          POSTGRES_DB: espalier_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Deno runs vitest via npx compatibility
      - run: deno run -A npm:vitest
        env:
          PG_HOST: localhost
          PG_PORT: 55432
          PG_USER: nesify
          PG_PASSWORD: nesify
          PG_DATABASE: espalier_test
